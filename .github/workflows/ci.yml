name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 13 * * *"  # daily e2e drift check (free on public repos)

jobs:
  unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: instagram
          POSTGRES_PASSWORD: instagram
          POSTGRES_DB: instagram
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U instagram" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://instagram:instagram@localhost:5432/instagram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run unit tests
        run: pytest tests/ -v

  e2e:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from example
        run: cp .env.example .env
      - name: Build images
        run: docker compose build
      - name: Source manifest and run e2e
        run: |
          set -e
          source verify/manifest.env
          eval "$TEST_DEPS"
          eval "$UP"
          eval "$READY"
          API_BASE_URL="http://localhost:${APP_PORT:-8010}" eval "$ACCEPTANCE"
      - name: Teardown
        if: always()
        run: |
          source verify/manifest.env
          eval "$DOWN"
