name: Functional

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 13 * * *"  # daily drift check (offset from CI)

jobs:
  functional:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: instagram
          POSTGRES_PASSWORD: instagram
          POSTGRES_DB: instagram
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U instagram" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://instagram:instagram@localhost:5432/instagram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run functional tests
        run: pytest tests/functional/ -v
