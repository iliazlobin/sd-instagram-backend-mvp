services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: instagram
      POSTGRES_PASSWORD: instagram
      POSTGRES_DB: instagram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U instagram"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    # No host port published — DB is internal to the compose network.
    # Publishing 5432 here would collide with any local Postgres.
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - instagram-net

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8010}:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - instagram-net

networks:
  instagram-net:

volumes:
  pgdata:
